---
kind: pipeline
name: chrony-pr
steps:
- image: plugins/docker
  name: build
  pull_image: true
  settings:
    compress: true
    context: chrony
    daemon_off: true
    dockerfile: chrony/Dockerfile
    dry_run: true
    ipv6: true
    password:
      from_secret: DOCKER_PASSWORD
    purge: true
    repo: zachfi/chrony
    username:
      from_secret: DOCKER_USERNAME
  volumes:
  - name: dockersock
    path: /var/run/docker.sock
trigger:
  branch:
    exclude:
    - main
  event:
  - push
  - pull_request
  paths:
    include:
    - chrony/**
volumes:
- host:
    path: /var/run/docker.sock
  name: dockersock
---
kind: pipeline
name: chrony-main
steps:
- image: plugins/docker
  name: build
  pull_image: true
  settings:
    compress: true
    context: chrony
    daemon_off: true
    dockerfile: chrony/Dockerfile
    dry_run: false
    ipv6: true
    password:
      from_secret: DOCKER_PASSWORD
    purge: false
    repo: zachfi/chrony
    username:
      from_secret: DOCKER_USERNAME
  volumes:
  - name: dockersock
    path: /var/run/docker.sock
- commands:
  - docker tag zachfi/chrony:latest reg.dist.svc.cluster.znet:5000/zachfi/chrony:latest
  - docker push reg.dist.svc.cluster.znet:5000/zachfi/chrony:latest
  image: reg.dist.svc.cluster.znet:5000/zachfi/tools
  name: push-local
  pull: always
  volumes:
  - name: dockersock
    path: /var/run/docker.sock
- commands:
  - docker system prune -f
  image: reg.dist.svc.cluster.znet:5000/zachfi/tools
  name: cleanup
  pull: always
  volumes:
  - name: dockersock
    path: /var/run/docker.sock
trigger:
  branch:
  - main
  event:
  - push
  paths:
    include:
    - chrony/**
  ref:
  - refs/heads/main
  - refs/tags/v*
volumes:
- host:
    path: /var/run/docker.sock
  name: dockersock
